# Config for running the demo against a local Temporal dev server, which the
# Human Task UI requires (its global list endpoints need a real backend; the
# IN_MEMORY runtime does not implement them).
#
# Start Temporal first:   temporal server start-dev
# Then run with this file: BAL_CONFIG_FILES=Config.local.toml bal run
[ballerina.workflow]
mode = "LOCAL"
url = "localhost:7233"
namespace = "default"

[ballerina.workflow.management]
enableManagementApi = true
# The UI's BFF is the trust boundary: it authenticates users and injects the
# x-user-id / x-user-roles headers. Disable management-side auth so the BFF can
# call it directly. (Do NOT expose this port publicly in a real deployment.)
enableBasicAuth = false
